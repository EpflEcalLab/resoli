# Sharing offer
qs_sharing.collection.offer:
  path: '/sharing/{community}/offers'
  defaults:
    _controller: '\Drupal\qs_sharing\Controller\OfferTypesCollectionController::offersTypeByTheme'
    _title: 'qs_sharing.collection.offer.title'
  requirements:
    _user_is_logged_in: 'TRUE'
    _custom_access: '\Drupal\qs_sharing\Controller\OfferTypesCollectionController::access'
    community: \d+
  options:
    parameters:
      community:
        type: entity:taxonomy_term

# Sharing request form
qs_sharing.add.request:
  path: '/sharing/{community}/request/add'
  defaults:
    _controller: '\Drupal\qs_sharing\Controller\RequestsController::add'
    _title: 'qs_sharing.form.request.add.title'
  requirements:
    _user_is_logged_in: 'TRUE'
    _custom_access: '\Drupal\qs_sharing\Controller\RequestsController::access'
    community: \d+
  options:
    parameters:
      community:
        type: entity:taxonomy_term

# Sharing user offers
qs_sharing.collection.user.offers:
  path: '/sharing/{community}/offers/{user}'
  defaults:
    _controller: '\Drupal\qs_sharing\Controller\OffersController::offersByUser'
    _title: 'qs_sharing.collection.user.offer.title'
  requirements:
    _user_is_logged_in: 'TRUE'
    _custom_access: '\Drupal\qs_sharing\Controller\OffersController::access'
    community: \d+
  options:
    parameters:
      community:
        type: entity:taxonomy_term
      user:
        type: entity:user
