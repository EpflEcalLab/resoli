# Sharing offer
qs_sharing.collection.offer:
  path: '/sharing/{community}/offers'
  defaults:
    _controller: '\Drupal\qs_sharing\Controller\OfferTypesCollectionController::offersTypeByTheme'
    _title: 'qs_sharing.collection.offer.title'
  requirements:
    _user_is_logged_in: 'TRUE'
    _custom_access: '\Drupal\qs_sharing\Controller\OfferTypesCollectionController::access'
    community: \d+
  options:
    parameters:
      community:
        type: entity:taxonomy_term

# Sharing request form
qs_sharing.requests.form.add:
  path: '/sharing/{community}/request/add'
  defaults:
    _form: '\Drupal\qs_sharing\Form\RequestAddForm'
    _title: 'qs_sharing.requests.form.add.title'
  requirements:
    _user_is_logged_in: 'TRUE'
    _custom_access: '\Drupal\qs_sharing\Form\RequestAddForm::access'
    community: \d+
  options:
    parameters:
      community:
        type: entity:taxonomy_term

# Sharing user offers
qs_sharing.collection.user.offers:
  path: '/sharing/{community}/user/{user}/offers'
  defaults:
    _controller: '\Drupal\qs_sharing\Controller\UserController::offers'
    _title: 'qs_sharing.user.offers.collection.title'
  requirements:
    _user_is_logged_in: 'TRUE'
    _custom_access: '\Drupal\qs_sharing\Controller\UserController::access'
    community: \d+
  options:
    parameters:
      community:
        type: entity:taxonomy_term
      user:
        type: entity:user

# Sharing offer form
qs_sharing.offers.form.add:
  path: '/sharing/{community}/offers/add'
  defaults:
    _controller: '\Drupal\qs_sharing\Controller\OffersController::add'
    _title: 'qs_sharing.offers.form.add.title'
  requirements:
    _user_is_logged_in: 'TRUE'
    _custom_access: '\Drupal\qs_sharing\Controller\OffersController::access'
    community: \d+
  options:
    parameters:
      community:
        type: entity:taxonomy_term

## PDF Export of Offers by communities.
qs_sharing.export.community.offers.pdf:
  path: '/sharing/export/community/{community}/pdf'
  defaults:
    _controller: '\Drupal\qs_sharing\Controller\ExportController::community'
  requirements:
    _user_is_logged_in: 'TRUE'
    _custom_access: '\Drupal\qs_sharing\Controller\ExportController::accessCommunity'
    community: \d+
  options:
    parameters:
      community:
        type: entity:taxonomy_term

## PDF Export of Offers by offer type.
qs_sharing.export.offer_type.offers.pdf:
  path: '/sharing/export/offer_type/{offer_type}/theme/{theme}/pdf'
  defaults:
    _controller: '\Drupal\qs_sharing\Controller\ExportController::offerType'
  requirements:
    _user_is_logged_in: 'TRUE'
    _custom_access: '\Drupal\qs_sharing\Controller\ExportController::accessOfferType'
    offer_type: \d+
    theme: \d+
  options:
    parameters:
      offer_type:
        type: entity:node
      theme:
        type: entity:taxonomy_term

