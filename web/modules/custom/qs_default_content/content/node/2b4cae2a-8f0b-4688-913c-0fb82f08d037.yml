  body:
    -
      value: "<p id=\"_description2\" itemprop=\"description\">Un Obus dans le coeur, une pièce de Wajdi Mouawad mise en scène par Laurent Gachoud à découvrir au Théâtre de l'Échandole à Yverdon-les-Bains les 26 et 27 octobre 2017.<br />\r\n<br />\r\nLa rencontre entre l’auteur canado-libanais Wajdi Mouawad et l’interprète Sofyen Khalfaoui promet manifestement une création puissante. Comédien très impliqué dans les programmes de soutien humanitaires tels qu’au Darfour et en Syrie, son œil se pose de façon toute personnelle sur les thèmes de prédilection de l’auteur, tels que le conflit ou les liens du sang.<br />\r\n<br />\r\nEn échos aux problématiques terroristes, migratoires et identitaires actuelles, ce spectacle ouvre notre regard de spectateur sur le cheminement intérieur à activer pour se reconstruire, reprendre foi en la vie et passer au-delà d’un traumatisme quel qu’il soit. Dans cette histoire, le personnage de Wahab se rend au chevet de sa mère mourante, emprunt à ses questionnements intérieurs. Cela nous touche au plus profond du cœur: de façon viscérale, libératrice et généreuse. C’est un récit initiatique avec en ligne de mire, la lumière salvatrice.</p>\r\n"
      format: full_html
      summary: ''
