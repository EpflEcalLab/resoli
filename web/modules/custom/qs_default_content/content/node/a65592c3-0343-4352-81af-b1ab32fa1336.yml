  body:
    -
      value: "<p>De David Pharao, mise en scène Jean-Luc Moreau<br />\r\nAvec Daniel Russo, Laurent Gamelon, Zoé Nonn…</p>\r\n\r\n<p id=\"_description2\" itemprop=\"description\"><em>Mariage et châtiment</em>, une pièce de David Pharao mise en scène par Jean-Luc Moreau à découvrir au Théâtre de Beausobre à Morges le 6 mars 2018.<br />\r\n<br />\r\nAlors qu’il s’apprête à être témoin au mariage de son meilleur ami avec une Miss Météo, Édouard apprend qu’il doit s’absenter pour répondre à une obligation professionnelle de dernière minute. Incapable d’avouer la vérité à ses proches, Édouard décide d’inventer un énorme mensonge, sans se douter que cette petite lâcheté va se retourner contre lui et prendre une tournure dramatique.<br />\r\n<br />\r\nToutes les vérités sont-elles bonnes à dire? C’est l’enjeu de cette comédie qui mêle quiproquos et faux-semblants dans une joyeuse pagaille. Il y a du Bourvil et du Louis de Funès dans le duo que forment Daniel Russo et Laurent Gamelon. Entre les deux comédiens aux personnalités complémentaires et attachantes, la complicité est palpable. De malentendus tragiques en rebondissements délirants, on rit autant qu’on est touché par cet hymne mordant à l’amitié.</p>\r\n"
