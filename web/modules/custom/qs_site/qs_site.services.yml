services:
  # Event subscriber to avoid access of some Taxonomy Terms
  qs_site.entity_access:
    class: Drupal\qs_site\EventSubscriber\EntityAccess
    arguments: ['@current_route_match']
    tags:
      - {name: event_subscriber}

  qs_site.twig.render:
    class: Drupal\qs_site\TwigExtension\Render
    calls:
      - [setContainer, ['@service_container']]
    tags:
      - { name: twig.extension }
