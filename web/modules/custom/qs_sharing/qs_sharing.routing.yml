# Sharing offer
qs_sharing.collection.offer:
  path: '/sharing/{community}/offer'
  defaults:
    _controller: '\Drupal\qs_sharing\Controller\OffersCollectionController::offer'
    _title: 'qs_sharing.collection.offer.title'
  requirements:
    _user_is_logged_in: 'TRUE'
    _custom_access: '\Drupal\qs_sharing\Controller\OffersCollectionController::access'
    community: \d+
  options:
    parameters:
      community:
        type: entity:taxonomy_term

# Sharing request form
qs_sharing.form.add.request:
  path: '/sharing/{community}/request/add'
  defaults:
    _form: '\Drupal\qs_sharing\Form\RequestAddForm'
    _title: 'qs_sharing.form.request.add.title'
  requirements:
    _user_is_logged_in: 'TRUE'
    _custom_access: '\Drupal\qs_sharing\Form\RequestAddForm::access'
    community: \d+
  options:
    parameters:
      community:
        type: entity:taxonomy_term
