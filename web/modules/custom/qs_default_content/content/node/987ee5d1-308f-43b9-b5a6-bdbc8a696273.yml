  body:
    -
      value: "<p id=\"_description2\" itemprop=\"description\">Après quelques infidélités à son auteur fétiche, Valentin Rossier revient à ses premières amours et présente \"la pièce écossaise\", celle dont on ne doit pas prononcer le nom dans un théâtre.&nbsp;Macbeth… Vision sombre de l’humanité, où l’oppression est vouée à succéder à l’oppression, où la frontière entre le visible et l’invisible se dissout. Transposé dans l’environnement aseptisé et glaçant d’un palace cinq étoiles,&nbsp;Macbeth&nbsp;ne dérogera cependant à aucune tradition shakespearienne: meurtre, trahison et folie!</p>\r\n"
