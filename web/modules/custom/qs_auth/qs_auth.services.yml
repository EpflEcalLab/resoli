services:
  qs_auth.auth_redirect:
    class: Drupal\qs_auth\EventSubscriber\AuthRedirect
    arguments: ['@current_route_match', '@current_user']
    tags:
      - {name: event_subscriber}

  qs_auth.account:
    class: Drupal\qs_auth\Service\Account
    arguments: ['@plugin.manager.mail', '@entity_type.manager', '@user.auth', '@entity.query', '@qs_acl.privilege_manger']
