<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Node Autocomplete</title>
    <link rel="stylesheet" href="/vendors.min.css" />
    <link rel="stylesheet" href="/base.css" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div class="container py-4">
      <div
        id="node-autocomplete"
        data-list='[{"id": "superunique001","theme": "themeid1", "name": "Lorem"},{"id": "superunique002","theme": "themeid2", "name": "Ipsum"},{"id": "superunique003","theme": "themeid3", "name": "Dolor"},{"id": "superunique004","theme": "themeid4", "name": "Sit"},{"id": "superunique005","theme": "themeid5", "name": "Amet"},{"id": "superunique006","theme": "themeid1", "name": "Lorem"},{"id": "superunique007","theme": "themeid2", "name": "Ipsum"},{"id": "superunique008","theme": "themeid3", "name": "Dolor"},{"id": "superunique009","theme": "themeid4", "name": "Sit"},{"id": "superunique0010","theme": "themeid5", "name": "Amet"}]'
        data-target-name="#node-autocomplete-target-name"
        data-target-id="#node-autocomplete-target-id"
        data-placeholder="Type something"
        data-create="Creation"
        data-value="superunique002"
        data-no-padding="true"
        data-no-option="No option available"
      ></div>
      <div class="py-4">
        <input type="text" id="node-autocomplete-target-id" class="sr-only" />
        <input type="text" id="node-autocomplete-target-name" class="sr-only" />
      </div>
    </div>
  </body>
</html>
