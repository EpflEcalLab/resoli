services:
  qs_activity.event_manager:
    class: Drupal\qs_activity\Service\EventManager
    arguments: ['@entity_type.manager', '@entity.query', '@database']

  qs_activity.activity_manager:
    class: Drupal\qs_activity\Service\ActivityManager
    arguments: ['@entity_type.manager', '@request_stack', '@database']

  # Redirect
  qs_activity.redirect:
    class: Drupal\qs_activity\EventSubscriber\RedirectSubscriber
    arguments: ['@current_route_match']
    tags:
      - { name: event_subscriber }
