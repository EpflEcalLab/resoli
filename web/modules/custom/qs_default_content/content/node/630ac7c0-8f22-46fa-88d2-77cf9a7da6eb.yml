  body:
    -
      value: "Bonjour,\r\n\r\nUne odeur de brûlé m’a alertée. En ouvrant le capot du moteur, le garagiste a immédiatement identifié l’origine du problème, a rajouté de l’huile et précisé qu’il fallait changer le couvre-culasse. \r\n\r\nLe véhicule est une Fiat 500 en boîte auto, acheté en 2016, donc plus sous garantie, et avec 15000 kms au compteur. Sur le tableau de bord, aucun voyant n’était allumé. \r\n\r\nJe suis désagréablement surprise de devoir remplacer une pièce sur une voiture aussi récente et ayant aussi peu roulé. Est-ce considéré comme normal ?\r\n\r\nMerci pour vos réponses."
