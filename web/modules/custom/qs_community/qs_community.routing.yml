# Welcome
qs_community.welcome:
    path: '/communities/{community}/welcome'
    defaults:
        _controller: '\Drupal\qs_community\Controller\WelcomeController::welcome'
        _title: 'qs.community.welcome'
    requirements:
      _user_is_logged_in: 'TRUE'
      _custom_access: '\Drupal\qs_community\Controller\WelcomeController::access'
    options:
      parameters:
        community:
          type: entity:taxonomy_term

# Community dashboard page - links of forms for CRUD operations
qs_community.dashboard:
    path: '/communities/{community}/dashboard'
    defaults:
      _controller: '\Drupal\qs_community\Controller\DashboardController::dashboard'
      _title: 'qs_community.dashboard.title'
    requirements:
      _user_is_logged_in: 'TRUE'
      _custom_access: '\Drupal\qs_community\Controller\DashboardController::access'
      community: \d+
    options:
      parameters:
        community:
          type: entity:taxonomy_term

## Collection of Accounts waiting for Approval by Community.
qs_community.waiting_approval:
    path: '/communities/{community}/dashboard/waiting-approval'
    defaults:
      _controller: '\Drupal\qs_community\Controller\WaitingApprovalController::waitingApproval'
      _title: 'qs_community.waiting_approval.title'
    requirements:
      _user_is_logged_in: 'TRUE'
      _custom_access: '\Drupal\qs_community\Controller\WaitingApprovalController::access'
      community: \d+
    options:
      parameters:
        community:
          type: entity:taxonomy_term

## Collection of Members by Community.
qs_community.members:
    path: '/communities/{community}/dashboard/members'
    defaults:
      _controller: '\Drupal\qs_community\Controller\MembersController::members'
      _title: 'qs_community.members.title'
    requirements:
      _user_is_logged_in: 'TRUE'
      _custom_access: '\Drupal\qs_community\Controller\MembersController::access'
      community: \d+
    options:
      parameters:
        community:
          type: entity:taxonomy_term


## Export of Members by Community.
qs_community.members.export:
    path: '/communities/{community}/dashboard/members/export'
    defaults:
      _controller: '\Drupal\qs_community\Controller\MembersController::export'
      _title: 'qs_community.members.export.title'
    requirements:
      _user_is_logged_in: 'TRUE'
      _custom_access: '\Drupal\qs_community\Controller\MembersController::access'
      community: \d+
    options:
      parameters:
        community:
          type: entity:taxonomy_term
