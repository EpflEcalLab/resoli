global-styling:
  css:
    theme:
      build/css/vendors.min.css: {}
      build/css/base.css: {}
  js:
    build/js/vendors.min.js: {}
    build/js/vendors.bundle.js: {}
    build/js/app.bundle.js: {}
  dependencies:
    - core/jquery
    - core/drupal
    - core/drupalSettings

# Google Map
google-map:
  version: 3.0
  js:
    https://maps.googleapis.com/maps/api/js?key=AIzaSyDCxS2BMP-uAhxYq2PcDKWJBtWc8ZwkBnY: {type: external, defer: true, async: true}

# Google Place Autocomplete Library
google-place-autocomplete:
  version: 3.0
  js:
    https://maps.googleapis.com/maps/api/js?key=AIzaSyDCxS2BMP-uAhxYq2PcDKWJBtWc8ZwkBnY&libraries=places: {type: external, defer: true, async: true}

# Photoswipe
photoswipe:
  version: 4.1.1
  css:
    theme:
      build/photoswipe/photoswipe.css: {}
  js:
    build/photoswipe/photoswipe.min.js: {}
    build/photoswipe/photoswipe-ui-default.min.js: {}
    build/photoswipe/qs-photoswipe.js: {}
  dependencies:
    - core/jquery
    - core/drupal
    - core/drupalSettings
