  body:
    -
      value: "<p id=\"_description2\" itemprop=\"description\">Labio de liebre \"Bec de lièvre\", une pièce écrite et mise en scène par Fabio Rubiano Orjuela à voir au Théâtre Kléber-Méleau (TKM) à Renens-Malley du 19 au 21 octobre 2017.<br />\r\n<br />\r\nLe Teatro Petra nous propose un théâtre lieu de mémoire, qui revient sur l’histoire de la Colombie, sur ses bourreaux et ses victimes, sur le désir de vengeance et le pardon.<br />\r\n<br />\r\nLe protagoniste de ce spectacle, Salvo Castello, est un homme dur et implacable, qui fut un tortionnaire et qui purge sa peine en résidence surveillée. Parmi les fantômes qui habitent avec lui sa demeure, il y a un garçon au bec de lièvre, Granado Sosa, mais aussi toute sa famille (sœur, frère et mère), des paysans dont il a ordonné le massacre.<br />\r\n<br />\r\nLa fable porte ainsi autant sur le pardon des victimes que sur la vengeance, le bourreau ne trouvant pas de repos dans sa retraite, tel Macbeth après son crime, ses victimes ne le quittant pas, ayant une présence fantomatique prégnante. Il les appelle, leur parle, se souvient: rien ne peut lui faire oublier ses exactions et leurs souffrances, sa cruauté et leur martyre, ses viols et leurs cris.</p>\r\n"
      format: full_html
      summary: ''
