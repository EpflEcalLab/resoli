# Photos by months
qs_photo.collection.month:
    path: '/photos/{community}/month'
    defaults:
      _controller: '\Drupal\qs_photo\Controller\CollectionController::months'
      _title: 'qs_photo.collection.monthly.title'
    requirements:
      _user_is_logged_in: 'TRUE'
      _custom_access: '\Drupal\qs_photo\Controller\CollectionController::access'
      community: \d+
    options:
      parameters:
        community:
          type: entity:taxonomy_term

# Photos by theme
qs_photo.collection.theme:
    path: '/photos/{community}/theme'
    defaults:
      _controller: '\Drupal\qs_photo\Controller\CollectionController::themes'
      _title: 'qs_photo.collection.themes.title'
    requirements:
      _user_is_logged_in: 'TRUE'
      _custom_access: '\Drupal\qs_photo\Controller\CollectionController::access'
      community: \d+
    options:
      parameters:
        community:
          type: entity:taxonomy_term

