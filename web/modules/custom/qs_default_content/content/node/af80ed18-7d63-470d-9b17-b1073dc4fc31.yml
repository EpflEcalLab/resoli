  body:
    -
      value: "<p>De Domenico Carli et Michel Voïta, mise en scène Michel Voïta<br />\r\nAvec Carine Barbey, Séverine Bujard, Erwan Creignou, Yves Jenny, Yasmina Rémil, Laurent Sandoz et Frank Semelet.</p>\r\n\r\n<p>Antoine Vitez nous invitait à \"faire théâtre de tout\", un adage dont a su se saisir Michel Voïta… en choisissant comme matière théâtrale pour sa nouvelle création un épisode de cette épopée au fondement de notre culture,&nbsp;<em>L’Iliade</em>&nbsp;d’Homère. Ce faisant, il s’agit de réfléchir ensemble à la violence de ces héros de légende et à la nôtre, penseurs et poètes comme guides possibles, de Simone Weil à Hannah Arendt en passant par René Char, en une traversée salutaire.</p>\r\n"
