global-styling:
  css:
    theme:
      build/css/vendors.min.css: {}
      build/css/base.css: {}
  js:
    build/js/vendors.min.js: {}
    build/js/vendors.bundle.js: {}
    build/js/app.bundle.js: {}
  dependencies:
    - core/jquery
    - core/drupal
    - core/drupalSettings

date:
  js:
    build/js/date.js: {}
  dependencies:
    - core/drupal
    - core/jquery.once
    - jquery_ui_datepicker/datepicker

# Google Map
google-map:
  version: 3.0
  js:
    https://maps.googleapis.com/maps/api/js?key=AIzaSyDCxS2BMP-uAhxYq2PcDKWJBtWc8ZwkBnY: {type: external, defer: true, async: true}

# Google Place Autocomplete Library
google-place-autocomplete:
  version: 3.0
  js:
    https://maps.googleapis.com/maps/api/js?key=AIzaSyDCxS2BMP-uAhxYq2PcDKWJBtWc8ZwkBnY&libraries=places: {type: external, defer: true, async: true}

# Polyfill for includes (ie happiness)
polyfill-io:
  version: 2.0
  js:
    https://cdn.polyfill.io/v2/polyfill.js?features=String.prototype.includes,Array.prototype.find: {type: external}

# Photoswipe
photoswipe:
  version: 4.1.1
  css:
    theme:
      build/photoswipe/photoswipe.css: {}
  js:
    build/photoswipe/photoswipe.min.js: {}
    build/photoswipe/photoswipe-ui-default.min.js: {}
    build/photoswipe/qs-photoswipe.js: {}
  dependencies:
    - core/jquery
    - core/drupal
    - core/drupalSettings

# Uppy uploader
uppy:
  version: 0.28.0
  css:
    theme:
      build/uppy/uppy.min.css: {}
  js:
    build/uppy/uppy.min.js: {}
    build/uppy/qs-uppy.js: {}
  dependencies:
    - core/jquery
    - core/drupal
    - core/drupalSettings

# Quill Rich Text Editor
quill:
  version: 1.3.7
  css:
    theme:
      build/quill/quill.bubble.css: {}
  js:
    build/quill/quill.js: {}
    build/quill/qs-quill.js: {}
  dependencies:
    - core/jquery
    - core/drupal
    - core/drupalSettings

# Node Autocomplete
node-autocomplete:
  js:
    libs/node-autocomplete/build/static/js/main.js: {}
