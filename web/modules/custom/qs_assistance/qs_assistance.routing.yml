# Assistance offers
qs_assistance.collection.offers:
  path: '/assistance/{community}/offers'
  defaults:
    _controller: '\Drupal\qs_assistance\Controller\CollectionController::offers'
    _title: 'qs_assistance.collection.offers.title'
  requirements:
    _user_is_logged_in: 'TRUE'
    _custom_access: '\Drupal\qs_assistance\Controller\CollectionController::access'
    community: \d+
  options:
    parameters:
      community:
        type: entity:taxonomy_term

# Assistance demands
qs_assistance.collection.demands:
  path: '/assistance/{community}/demands'
  defaults:
    _controller: '\Drupal\qs_assistance\Controller\CollectionController::demands'
    _title: 'qs_assistance.collection.demands.title'
  requirements:
    _user_is_logged_in: 'TRUE'
    _custom_access: '\Drupal\qs_assistance\Controller\CollectionController::access'
    community: \d+
  options:
    parameters:
      community:
        type: entity:taxonomy_term
