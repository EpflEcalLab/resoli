  body:
    -
      value: "<p id=\"_description2\" itemprop=\"description\">Victor Vatard - Dire l’inverse, penser le contraire et vice-versa!, un seul en scène de par Fabian Ferrari et mis en scène par Brigitte Boucher à découvrir au Casino Théâtre de Rolle du 26 au 29 octobre 2017.<br />\r\n<br />\r\nVictor Vatard, impitoyable critique de la gastronomie parisienne et défenseur le plus engagé et tonitruant de la moule belge, vous entraîne dans son univers aussi caustique que savoureux!<br />\r\n<br />\r\nVictor Vatard est critique gastronomique et belge, fondateur de moulestoujours.com et du guide \"Les Contournables\": les 100 restaurants à éviter à tout prix. Il porte un regard percutant sur l’industrie agroalimentaire, la consommation et ses dérives mais aussi sur la politique sans les idées, la fortune sans le travail, la jouissance sans la conscience ou encore le sexe sans l’amour. Un humour bien assaisonné et traduit en direct avec un bon coup de mixer.<br />\r\n<br />\r\nSpectacle d’humour et d’esprit, Victor Vatard a pour but de dessiner et de raconter un personnage de caractère, aussi caustique que savoureux, quelque peu perdu dans l’évolution de la société et la puissance de l’industrie agroalimentaire.</p>\r\n"
