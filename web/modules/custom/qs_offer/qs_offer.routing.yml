## PDF Export of Offers by communities.
qs_community.offers.export.pdf:
  path: '/offers/{community}/exportToPdf'
  defaults:
    _controller: '\Drupal\qs_offer\Controller\OffersController::exportToPdf'
  requirements:
    _user_is_logged_in: 'TRUE'
    _custom_access: '\Drupal\qs_offer\Controller\OffersController::access'
    community: \d+
  options:
    parameters:
      community:
        type: entity:taxonomy_term
