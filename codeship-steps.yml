- name: Running tests
  type: parallel
  exclude: '^\d+\.\d+\.\d+$'
  steps:
    - name: Artifacts
      type: serial
      steps:
        - name: Artifacts
          service: behat
          command: >-
            bash -c "touch /var/www/log/test-09092021.log && docker-as-artifacts --recursive --local-dir=/var/www/log"
    - name: Behaviour
      type: serial
      steps:
        - name: Bootstrap
          type: parallel
          steps:
            - name: Drupal
              service: test
              command: docker-as-wait --mysql -- docker-as-drupal bootstrap --install-only
              encrypted_dockercfg_path: .codeship/dockercfg.encrypted
            - name: Styleguide
              service: node
              command: >-
                bash -c "yarn build --production &&
                  mkdir -p /var/www/.codeship/build/styleguide &&
                  mv /var/www/web/themes/quartiers_solidaires/build/* /var/www/.codeship/build/styleguide/"
              encrypted_dockercfg_path: .codeship/dockercfg.encrypted
        - name: Features
          type: serial
          steps:
            - name: Behat
              service: behat
              command: >-
                bash -c "docker-as-wait --mysql test:8888 browser:4444 -- ./.codeship/scripts/setup_hosts.sh --
                  docker-as-drupal behat --user=www-data ||
                  (docker-as-artifacts --recursive --local-dir=/var/www/log && exit 1)"
              encrypted_dockercfg_path: .codeship/dockercfg.encrypted
    - name: Unit
      service: test
      command: docker-as-wait --mysql -- docker-as-drupal phpunit --skip-default-stops --group=qs
      encrypted_dockercfg_path: .codeship/dockercfg.encrypted
- name: Running deploy
  type: serial
  tag: "^(dev|master)$"
  steps:
    - name: Deploy to staging
      tag: dev
      service: deploy
      command: bundle exec cap staging deploy
      encrypted_dockercfg_path: .codeship/dockercfg.encrypted
    - name: Deploy to production
      tag: master
      service: deploy
      command: bundle exec cap production deploy
      encrypted_dockercfg_path: .codeship/dockercfg.encrypted
