version: '3.6'

services:
  # Drupal development server
  dev:
    build: .
    command: docker-as-wait --mysql -- docker-as-drupal apache-server
    depends_on:
      - db
      - mail
    environment:
      APP_ENV: development
      BASE_URL: http://localhost:80
      DATABASE_URL: mysql://drupal:drupal@db/drupal_development
      PRIVATE_FILES: /var/www/web/sites/default/files/private
      DEFAULT_CONTENT: qs_default_content
    restart: "no"
    volumes:
      - backups:/var/backups
      # Drupal
      - ./composer.json:/var/www/composer.json:cached
      - ./composer.lock:/var/www/composer.lock:cached
      - ./config:/var/www/config:cached
      - ./web/modules/custom:/var/www/web/modules/custom:cached
      # Styleguide
      - ./package.json:/var/www/package.json:cached
      - ./yarn.lock:/var/www/yarn.lock:cached
      - ./web/themes/quartiers_solidaires:/var/www/web/themes/quartiers_solidaires:cached
      # Files
      - ./web/sites/default/files:/var/www/web/sites/default/files:delegated
      # Behat
      - ./behat:/var/www/behat:cached
      - ./behat.yml:/var/www/behat.yml:cached
      # Drush
      - ./config/d8/docker.drush.yml:/var/www/drush/drush.yml:cached

  # Drupal test server
  test:
    build: .
    command: docker-as-wait --mysql -- docker-as-drupal apache-server
    depends_on:
      - db
      - mail
      - browser
    environment:
      APP_ENV: test
      BASE_URL: http://localhost:8888
      DATABASE_URL: mysql://drupal:drupal@db/drupal_test
      PRIVATE_FILES: /var/www/web/sites/default/files/private
      REQUIRED_DIRECTORIES: >-
        /var/www/log/behat
        /var/www/dump/behat
      BEHAT_PROFILE: default
      TEST_DISABLE_MODULES: >-
        big_pipe
        honeypot
        captcha
        recaptcha
      TEST_USER: www-data
      DEFAULT_CONTENT: qs_default_content
      PHPUNIT_DEFAULT_GROUP: qs
      ARTIFACTS_BUCKET: codeship-artifact
      ARTIFACTS_LOG_DIR: /var/www/log
      CI_REPO_NAME: quartiers-solidaires
    restart: "no"
    volumes:
      - backups:/var/backups
      # Drupal
      - ./composer.json:/var/www/composer.json:cached
      - ./composer.lock:/var/www/composer.lock:cached
      - ./config:/var/www/config:cached
      - ./web/modules/custom:/var/www/web/modules/custom:cached
      # Styleguide
      - ./package.json:/var/www/package.json:cached
      - ./yarn.lock:/var/www/yarn.lock:cached
      - ./web/themes/quartiers_solidaires:/var/www/web/themes/quartiers_solidaires:cached
      # Behat
      - ./behat:/var/www/behat:cached
      - ./behat.yml:/var/www/behat.yml:cached
      # Drush
      - ./config/d8/docker.drush.yml:/var/www/drush/drush.yml:cached
    networks:
      default:
        aliases:
          # Hosts used in default content for testing
          - resoli.test

  # Test browser
  browser:
    image: selenium/standalone-chrome
    volumes:
      - /dev/shm:/dev/shm

  # Database
  db:
    image: mariadb:10.4
    environment:
      MYSQL_USER: drupal
      MYSQL_PASSWORD: drupal
      MYSQL_DATABASE: drupal_%
      MYSQL_ROOT_PASSWORD: root
    restart: unless-stopped
    volumes:
      - database:/var/lib/mysql

  # Mail
  mail:
    image: schickling/mailcatcher
    restart: unless-stopped

volumes:
  database:
  backups:
