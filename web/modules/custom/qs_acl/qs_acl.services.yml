services:
  qs_acl.access_control:
    class: Drupal\qs_acl\Service\AccessControl
    arguments:
      - '@current_user'
      - '@entity_type.manager'
    calls:
      - [setContainer, ['@service_container']]

  qs_acl.privilege_manager:
    class: Drupal\qs_acl\Service\PrivilegeManager
    arguments: ['@current_user', '@entity_type.manager', '@database', '@pager.manager']
