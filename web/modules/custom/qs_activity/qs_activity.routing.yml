# Activities by themes
qs_activity.collection.themes:
    path: '/activities/{community}/theme'
    defaults:
      _controller: '\Drupal\qs_activity\Controller\CollectionController::themes'
      _title: 'qs_activity.collection.themes.title'
    requirements:
      _user_is_logged_in: 'TRUE'
      _custom_access: '\Drupal\qs_activity\Controller\CollectionController::access'
      community: \d+
    options:
      parameters:
        community:
          type: entity:taxonomy_term

# Activities add form
qs_activity.activities.form.add:
    path: '/activities/{community}/add'
    defaults:
      _form: '\Drupal\qs_activity\Form\ActivityAddForm'
      _title: 'qs_activity.form.add.title'
    requirements:
      _user_is_logged_in: 'TRUE'
      _custom_access: '\Drupal\qs_activity\Form\ActivityAddForm::access'
      community: \d+
    options:
      parameters:
        community:
          type: entity:taxonomy_term

# Activities settings page (link on forms for edition)
qs_activity.activities.form.edit:
    path: '/activities/{activity}/edit'
    defaults:
      _controller: '\Drupal\qs_activity\Controller\ActivitySettingsController::settings'
      _title: 'qs_activity.settings.title'
    requirements:
      _user_is_logged_in: 'TRUE'
      _custom_access: '\Drupal\qs_activity\Controller\ActivitySettingsController::access'
      activity: \d+
    options:
      parameters:
        activity:
          type: entity:node

